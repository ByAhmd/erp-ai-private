services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp_ai
      POSTGRES_USER: erp_ai
      POSTGRES_PASSWORD: erp_ai_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp_ai -d erp_ai']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp-ai-redis
    restart: unless-stopped
    command: redis-server --requirepass erp_ai_redis_password --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'erp_ai_redis_password', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
